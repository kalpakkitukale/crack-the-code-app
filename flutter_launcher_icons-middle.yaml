# Middle segment app icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_middle.png"

  # Android adaptive icon
  adaptive_icon_foreground: "assets/icons/icon_middle.png"
  adaptive_icon_background: "#009688"

  # iOS icon
  remove_alpha_ios: true

  # Web icon
  web:
    generate: true
    image_path: "assets/icons/icon_middle.png"
    background_color: "#009688"
    theme_color: "#009688"

  # Windows icon
  windows:
    generate: true
    image_path: "assets/icons/icon_middle.png"
    icon_size: 48

  # macOS icon
  macos:
    generate: true
    image_path: "assets/icons/icon_middle.png"
